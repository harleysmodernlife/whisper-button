<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a38"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="micBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Mic capsule -->
  <rect x="92" y="38" width="72" height="112" rx="36" fill="url(#micBody)"/>

  <!-- Grille lines -->
  <line x1="104" y1="88"  x2="152" y2="88"  stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
  <line x1="104" y1="104" x2="152" y2="104" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
  <line x1="104" y1="120" x2="152" y2="120" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>

  <!-- Stand arc -->
  <path d="M66 152 Q66 206 128 206 Q190 206 190 152"
        fill="none" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="128" y1="206" x2="128" y2="226" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="92" y1="226" x2="164" y2="226" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round"/>
</svg>
